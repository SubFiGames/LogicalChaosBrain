name: Build Fallback VST3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Steinberg VST3 SDK
        uses: actions/checkout@v4
        with:
          repository: steinbergmedia/vst3sdk
          submodules: recursive
          path: tools/vst3sdk

      - name: Configure
        shell: pwsh
        run: |
          cmake `
            -S vst3 `
            -B build-vst3 `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DVST3_SDK_ROOT="$env:GITHUB_WORKSPACE/tools/vst3sdk"

      - name: Build
        shell: pwsh
        run: cmake --build build-vst3 --config Release --parallel

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $vst3 = Get-ChildItem -Path build-vst3 -Recurse -Directory -Filter "*.vst3" | Select-Object -First 1
          if (-not $vst3) {
            Write-Error "No .vst3 bundle was built."
            Get-ChildItem -Path build-vst3 -Recurse | Select-Object -First 400 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Copy-Item $vst3.FullName -Destination artifact -Recurse -Force
          Get-ChildItem -Path artifact -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Fallback-Windows-VST3
          path: artifact

  build-macos:
    name: macOS VST3
    runs-on: macos-14

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Steinberg VST3 SDK
        uses: actions/checkout@v4
        with:
          repository: steinbergmedia/vst3sdk
          submodules: recursive
          path: tools/vst3sdk

      - name: Configure
        run: |
          cmake \
            -S vst3 \
            -B build-vst3 \
            -GXcode \
            -DVST3_SDK_ROOT="$GITHUB_WORKSPACE/tools/vst3sdk"

      - name: Build
        run: cmake --build build-vst3 --config Release --parallel

      - name: Collect artifact
        run: |
          mkdir -p artifact
          VST3_PATH=$(find build-vst3 -name "*.vst3" -type d | head -1)
          if [ -z "$VST3_PATH" ]; then
            echo "No .vst3 bundle was built."
            find build-vst3 -maxdepth 6 -print | head -400
            exit 1
          fi
          cp -R "$VST3_PATH" artifact/
          find artifact -maxdepth 5 -print

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Fallback-macOS-VST3
          path: artifact
