name: Build Android App

on:
  workflow_dispatch:

env:
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build-android:
    # ubuntu-latest is 24.04 which dropped libwebkit2gtk-4.0 that cmaj requires;
    # pin to 22.04 where it is still available
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            at-spi2-core \
            dbus-x11

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download and extract Cmajor Linux tools
        run: |
          set -euo pipefail
          mkdir -p tools/cmajor

          # The Linux release asset for 1.0.3096 is a ZIP named cmajor.linux.x64.zip
          archive_url="https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor.linux.x64.zip"
          archive_file="cmajor_linux_tools.zip"

          echo "Downloading Cmajor Linux tools: ${archive_url}"
          curl -fL "${archive_url}" -o "${archive_file}"

          echo "Extracting..."
          unzip -q "${archive_file}" -d tools/cmajor

          cmaj_path="$(find "${GITHUB_WORKSPACE}/tools/cmajor" -type f -name cmaj | head -n 1)"
          if [ -z "${cmaj_path}" ]; then
            echo "Could not find cmaj executable after extraction" >&2
            find tools/cmajor -maxdepth 5 | head -50
            exit 1
          fi

          chmod +x "${cmaj_path}"
          echo "CMAJ_PATH=${cmaj_path}" >> "$GITHUB_ENV"
          echo "Found cmaj at: ${cmaj_path}"

      - name: Generate JUCE project for Android
        shell: bash
        run: |
          set -euo pipefail
          # GDK_BACKEND=offscreen tells GTK to render into memory rather than
          # connecting to an X server, so cmaj never blocks on a display event loop
          GDK_BACKEND=offscreen "$CMAJ_PATH" generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch

      - name: Build Android APK with Gradle
        run: |
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
