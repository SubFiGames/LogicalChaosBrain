name: Android CI (Option B - Template Host)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_API: "34"
      ANDROID_ABI: "arm64-v8a"
      HOST_REPO: "juce-framework/JUCE"
      HOST_REF: "master"

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v4

      - name: Checkout JUCE template host
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOST_REPO }}
          ref: ${{ env.HOST_REF }}
          path: host

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install cmaj CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          API_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/cmajor-lang/cmajor/releases/latest)
          export API_JSON

          URL=$(python - <<'PY'
          import json, os
          data = json.loads(os.environ['API_JSON'])
          assets = data.get('assets', [])
          preferred = None
          fallback = None
          for a in assets:
              n = a.get('name', '').lower()
              url = a.get('browser_download_url')
              if not url:
                  continue
              if 'linux' not in n:
                  continue
              if not (n.endswith('.zip') or n.endswith('.tar.gz')):
                  continue
              if not any(k in n for k in ('cmaj', 'command', 'tools')):
                  continue
              if any(k in n for k in ('x64', 'x86_64', 'amd64')):
                  preferred = url
                  break
              fallback = fallback or url
          print(preferred or fallback or '')
          PY)

          if [ -z "$URL" ]; then
            echo "No suitable Linux cmaj asset found in latest release"
            exit 1
          fi

          curl -fL "$URL" -o cmaj_pkg
          mkdir -p cmaj
          if file cmaj_pkg | grep -qi zip; then
            mv cmaj_pkg cmaj.zip
            unzip -q cmaj.zip -d cmaj
          else
            mv cmaj_pkg cmaj.tar.gz
            tar -xzf cmaj.tar.gz -C cmaj
          fi

          echo "Discovered cmaj candidates:"
          find cmaj -type f \( -name cmaj -o -name cmaj.exe \) | sort

          CMAJ_BIN=""
          while IFS= read -r candidate; do
            chmod +x "$candidate" || true
            meta=$(file "$candidate" 2>/dev/null || true)
            echo "candidate: $candidate :: $meta"
            case "$meta" in
              *"ELF 64-bit"*x86-64*)
                if "$candidate" --version >/dev/null 2>&1; then
                  CMAJ_BIN="$candidate"
                  break
                fi
                ;;
            esac
          done < <(find cmaj -type f -name cmaj | sort)

          if [ -z "$CMAJ_BIN" ]; then
            echo "ERROR: no runnable Linux cmaj binary was found"
            exit 1
          fi

          echo "CMAJ_BIN=$CMAJ_BIN" >> "$GITHUB_ENV"
          echo "Selected cmaj: $CMAJ_BIN"
          file "$CMAJ_BIN" || true
          "$CMAJ_BIN" --version

      - name: Generate JUCE project from patch
        run: |
          set -euo pipefail
          "$CMAJ_BIN" generate \
            --target=juce \
            --jucePath="$GITHUB_WORKSPACE/host" \
            --output generated-juce \
            LogicalChaos.cmajorpatch

      - name: Configure Android build via CMake
        run: |
          set -euo pipefail
          NDK_PATH="$ANDROID_NDK_ROOT"
          cmake -S generated-juce -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DANDROID_PLATFORM=android-${ANDROID_API} \
            -DANDROID_ABI=${ANDROID_ABI} \
            -DCMAKE_ANDROID_NDK="$NDK_PATH"

      - name: Build
        run: cmake --build build-android --config Release --parallel

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: android-build-output
          path: build-android
