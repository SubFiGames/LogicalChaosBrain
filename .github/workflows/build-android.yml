name: Build Cmajor Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # The exact name of your patch file in the repo
  PATCH_FILE: "LogicalChaos.cmajorpatch" 

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout JUCE Framework
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: JUCE

      - name: Download and Install Cmajor CLI
        run: |
          # Fetch the correct Linux x64 binary
          wget https://github.com/cmajor-lang/cmajor/releases/latest/download/cmajor.linux.x64.zip -O cmajor.zip
          unzip cmajor.zip -d cmajor-cli
          
          # Make the binary executable
          chmod +x cmajor-cli/bin/cmaj
          
          # Add the bin directory to GITHUB_PATH
          echo "${{ github.workspace }}/cmajor-cli/bin" >> $GITHUB_PATH

      - name: Generate JUCE Project from Patch
        run: |
          # Generate the C++ source from the Cmajor patch
          cmaj generate \
            --target=juce \
            --jucePath=${{ github.workspace }}/JUCE \
            ${{ env.PATCH_FILE }} \
            --output=GeneratedApp

      - name: Configure CMake for Android
        run: |
          # $ANDROID_NDK_LATEST_HOME is provided by the GitHub runner
          cmake -B build -S GeneratedApp \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared

      - name: Build APK
        run: |
          # Build the release version
          cmake --build build --config Release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-APK
          path: build/**/*.apk
          wget https://github.com/cmajor-lang/cmajor/releases/latest/download/cmajor.linux.x64.zip -O cmajor.zip
          unzip cmajor.zip -d cmajor-cli
          
          # Add the bin directory to GITHUB_PATH so 'cmaj' is accessible globally
          echo "${{ github.workspace }}/cmajor-cli/bin" >> $GITHUB_PATH


      - name: Generate JUCE Project from Patch
        run: |
          # Converts your .cmajorpatch into an Android-ready C++ project
          cmaj generate \
            --target=juce \
            --jucePath=${{ github.workspace }}/JUCE \
            ${{ env.PATCH_FILE }} \
            --output=GeneratedApp

      - name: Configure CMake for Android
        run: |
          # $ANDROID_NDK_LATEST_HOME is pre-installed on GitHub's ubuntu-latest runners
          cmake -B build -S GeneratedApp \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared

      - name: Build APK
        run: |
          # This compiles the C++ code and triggers JUCE's internal Gradle hook to package the APK
          cmake --build build --config Release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmajor-android-apk
          path: build/**/*.apk
