name: Build Cmajor Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PATCH_FILE: "LogicalChaos.cmajorpatch"
  APP_NAME: "LogicalChaosMelodyMachine"
  JAVA_VERSION: "17"
  # NDK r25c == 25.2.9519653  (must match ndkVersion in app-build.gradle)
  NDK_VERSION: "r25c"
  NDK_FULL_VERSION: "25.2.9519653"

jobs:
  build:
    name: Build Android APK
    # ubuntu-22.04 ships libwebkit2gtk-4.0 which the Cmajor CLI binary requires.
    # ubuntu-latest (24.04) dropped that library, causing the CLI to crash on load.
    runs-on: ubuntu-22.04

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source checkout
      # ------------------------------------------------------------------ #
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Java
      # ------------------------------------------------------------------ #
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      # ------------------------------------------------------------------ #
      # 3. Android SDK  (no NDK here — handled by nttld/setup-ndk below)
      # ------------------------------------------------------------------ #
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-33
            build-tools;33.0.2
            platform-tools

      # ------------------------------------------------------------------ #
      # 4. Android NDK r25c = 25.2.9519653
      # ------------------------------------------------------------------ #
      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify Android SDK + NDK
        run: |
          echo "ANDROID_HOME       : $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT   : $ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME   : $ANDROID_NDK_HOME"
          echo "NDK path (nttld)   : ${{ steps.setup-ndk.outputs.ndk-path }}"

      # ------------------------------------------------------------------ #
      # 5. Build dependencies
      #    webkit2gtk-4.0 is pre-installed on ubuntu-22.04.
      # ------------------------------------------------------------------ #
      - name: Install Build Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libwebkit2gtk-4.0-dev libgtk-3-dev \
            libasound2-dev libpulse-dev \
            libfreetype6 libcurl4 \
            xvfb

      # ------------------------------------------------------------------ #
      # 6. JUCE Framework — pinned to stable release
      # ------------------------------------------------------------------ #
      - name: Checkout JUCE Framework
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: "7.0.9"
          fetch-depth: 1
          path: JUCE

      # ------------------------------------------------------------------ #
      # 7. Cmajor CLI
      # ------------------------------------------------------------------ #
      - name: Download and Install Cmajor CLI
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  CMAJ_ARCH="x64"   ;;
            aarch64) CMAJ_ARCH="arm64" ;;
            *)       CMAJ_ARCH="x64"   ;;
          esac
          echo "Architecture: $ARCH  ->  Cmajor package: $CMAJ_ARCH"

          wget -q \
            "https://github.com/cmajor-lang/cmajor/releases/latest/download/cmajor.linux.${CMAJ_ARCH}.zip" \
            -O cmajor.zip
          unzip -q cmajor.zip -d cmajor-cli

          find cmajor-cli -name "cmaj" -type f -exec chmod +x {} \;
          CMAJ_BIN=$(find cmajor-cli -name "cmaj" -type f | head -1)
          echo "$(dirname "$CMAJ_BIN")" >> "$GITHUB_PATH"
          echo "Cmajor binary: $CMAJ_BIN"

      - name: Verify Cmajor CLI
        run: |
          cmaj --version
          echo "Cmajor CLI is working."

      # ------------------------------------------------------------------ #
      # 8. Generate JUCE project from the Cmajor patch
      # ------------------------------------------------------------------ #
      - name: Generate JUCE Project from Cmajor Patch
        run: |
          echo "=== Generating JUCE project ==="

          # ------------------------------------------------------------------
          # Cmajor's CLI pulls in JUCE/CHOC which can briefly spin up a GTK
          # main loop (for WebView probing).  On GitHub's headless runner this
          # causes the GTK-CRITICAL 'main_loops != NULL' warning AND can hang
          # the CLI indefinitely if the assertion happens before the main
          # loop starts.  Mitigations:
          #   1. xvfb-run: provides a virtual X display so any GUI init
          #      succeeds and returns cleanly.
          #   2. GDK_BACKEND=offscreen: belt-and-braces — any GDK code paths
          #      that still run avoid needing a real display.
          #   3. timeout 180: hard-fail after 3 minutes rather than hanging
          #      for the full 6-hour job timeout.
          # ------------------------------------------------------------------
          set +e
          GDK_BACKEND=offscreen \
          timeout --kill-after=10 180 \
            xvfb-run -a --server-args='-screen 0 1024x768x24' \
              cmaj generate \
                --target=juce \
                --jucePath="${{ github.workspace }}/JUCE" \
                "${{ env.PATCH_FILE }}" \
                --output=GeneratedApp 2>&1 | tee cmaj-generate.log
          GEN_RC=${PIPESTATUS[0]}
          set -e
          echo "cmaj generate exit code: ${GEN_RC}"
          if [ "${GEN_RC}" = "124" ]; then
            echo "ERROR: cmaj generate HUNG — killed by timeout after 180s."
            echo "This usually means Cmajor CLI is stuck initialising a GUI."
            exit 1
          fi

          if [ ! -d "GeneratedApp" ]; then
            echo "ERROR: GeneratedApp directory was not created."
            echo "=== cmaj-generate.log ==="
            cat cmaj-generate.log
            exit 1
          fi

          echo "=== Generated files (first 40) ==="
          find GeneratedApp -type f | sort | head -40

      - name: Show Generated CMakeLists.txt
        run: |
          head -80 GeneratedApp/CMakeLists.txt || echo "CMakeLists.txt not found"

      # ------------------------------------------------------------------ #
      # 9. Android project structure
      # ------------------------------------------------------------------ #
      - name: Create Android Studio Project Structure
        run: |
          mkdir -p AndroidProject/app/src/main/cpp
          # NOTE: the Java package path MUST match the applicationId
          # (com.subfigames.logicalchaos.melodymachine) — if it's off by
          # one segment, AndroidManifest's `.MainActivity` resolves to a
          # class that doesn't exist and the app crashes on launch with
          # ClassNotFoundException.
          mkdir -p AndroidProject/app/src/main/java/com/subfigames/logicalchaos/melodymachine
          mkdir -p AndroidProject/app/src/main/res/values
          mkdir -p AndroidProject/app/src/main/assets

          # Copy generated JUCE/Cmajor C++ code
          cp -r GeneratedApp/* AndroidProject/app/src/main/cpp/

          # Copy the JNI bridge that drives the audio engine from Java.
          cp .github/android-templates/android_bridge.cpp \
             AndroidProject/app/src/main/cpp/android_bridge.cpp

          # Build an Android-safe index.html with view.js inlined.
          # Android WebView file:// blocks dynamic import/fetch in many configs.
          python3 - <<'PYINLINE'
          from pathlib import Path
          template = Path('AndroidProject/app/src/main/assets/index.template.html')
          template.write_text(Path('.github/android-templates/index.html').read_text())

          view = Path('view.js').read_text()
          view = view.replace('export default function createPatchView',
                              'window.createPatchView = function createPatchView', 1)

          html = template.read_text().replace('/*__INLINE_VIEW_JS__*/', view)
          Path('AndroidProject/app/src/main/assets/index.html').write_text(html)
          template.unlink()
          PYINLINE

          echo "C++ source files:"
          find AndroidProject/app/src/main/cpp -maxdepth 2 -type f | head -20
          echo "Assets:"
          ls -la AndroidProject/app/src/main/assets/

      # ------------------------------------------------------------------ #
      # 10. Patch CHOC headers for Android
      #
      # The Cmajor JUCE target uses CHOC's WebView/MessageLoop which
      # hard-errors on Android (CHOC detects __linux__ from the NDK target
      # triple "aarch64-linux-android" and tries to use X11/GTK code that
      # doesn't exist on Android).
      #
      # patch_android.py wraps the original file content in
      #   #else  // not Android
      # and injects no-op Android stubs above it, so:
      #   - Android: gets clean stubs (no CHOC UI, but audio works)
      #   - Desktop: gets the original CHOC implementation unchanged
      # ------------------------------------------------------------------ #
      - name: Patch CHOC Headers for Android
        run: |
          python3 .github/scripts/patch_android.py \
            AndroidProject/app/src/main/cpp

      # ------------------------------------------------------------------ #
      # 10b. Wire our JNI bridge into the generated CMakeLists.txt.
      #
      # The Cmajor JUCE export creates a JUCE plugin target (e.g.
      # LogicalChaosMelodyMachine) with _Standalone, _VST3 etc. sub-targets.
      # On Android only Standalone is meaningful.  We append android_bridge.cpp
      # to the Standalone target so our JNI symbols end up in the same .so
      # that MainActivity loads (lib<APP>_Standalone.so).
      # ------------------------------------------------------------------ #
      - name: Patch CMakeLists.txt to include Android JNI bridge
        run: |
          CMK="AndroidProject/app/src/main/cpp/CMakeLists.txt"
          TPL=".github/android-templates/cmake-android-jni-append.cmake"
          if [ ! -f "$CMK" ]; then echo "ERROR: $CMK not found"; exit 1; fi
          if [ ! -f "$TPL" ]; then echo "ERROR: $TPL not found"; exit 1; fi

          # Detect the JUCE target name from the generated CMakeLists.  Cmajor's
          # JUCE export calls juce_add_plugin(<TARGET> ...).
          JUCE_TARGET=$(grep -oE 'juce_add_plugin\s*\(\s*[A-Za-z_][A-Za-z0-9_]*' "$CMK" \
                        | head -1 | awk -F'[(]' '{print $2}' | tr -d ' ')
          if [ -z "$JUCE_TARGET" ]; then
            JUCE_TARGET="${{ env.APP_NAME }}"
            echo "WARN: juce_add_plugin() target not found — defaulting to '$JUCE_TARGET'"
          fi
          echo "Detected JUCE target: $JUCE_TARGET"

          # Substitute @JUCE_TARGET@ and append.
          sed "s/@JUCE_TARGET@/${JUCE_TARGET}/g" "$TPL" >> "$CMK"
          echo "CMakeLists.txt now ends with:"
          tail -25 "$CMK"

      # ------------------------------------------------------------------ #
      # 11. Copy Gradle build files from templates stored in the repo
      # ------------------------------------------------------------------ #
      - name: Copy Gradle Build Files
        run: |
          TPLS="${{ github.workspace }}/.github/android-templates"

          cp "$TPLS/build.gradle"        AndroidProject/build.gradle
          cp "$TPLS/app-build.gradle"    AndroidProject/app/build.gradle
          cp "$TPLS/settings.gradle"     AndroidProject/settings.gradle
          cp "$TPLS/gradle.properties"   AndroidProject/gradle.properties
          cp "$TPLS/AndroidManifest.xml" AndroidProject/app/src/main/AndroidManifest.xml
          cp "$TPLS/strings.xml"         AndroidProject/app/src/main/res/values/strings.xml

          # MainActivity: required by the <activity android:name=".MainActivity"/>
          # declaration in AndroidManifest.xml.  Without this, Android throws
          # ClassNotFoundException on launch and the app crashes instantly.
          cp "$TPLS/MainActivity.java" \
             AndroidProject/app/src/main/java/com/subfigames/logicalchaos/melodymachine/MainActivity.java

          touch AndroidProject/app/proguard-rules.pro

          echo "Gradle files copied:"
          find AndroidProject -name "*.gradle" -o -name "gradle.properties" \
               -o -name "AndroidManifest.xml" -o -name "MainActivity.java" | sort

      # ------------------------------------------------------------------ #
      # 12. Install Gradle & create wrapper
      # ------------------------------------------------------------------ #
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "${{ github.workspace }}/gradle-8.4/bin" >> "$GITHUB_PATH"
          gradle-8.4/bin/gradle --version | head -1

      - name: Create Gradle Wrapper
        run: |
          cd AndroidProject
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      # ------------------------------------------------------------------ #
      # 13. Build APK
      # ------------------------------------------------------------------ #
      - name: Build APK with Gradle
        run: |
          cd AndroidProject

          # pipefail: make the pipeline fail if Gradle fails, not just if tee fails.
          # Without this, `cmd | tee` always exits 0 (tee's exit code) even when
          # Gradle/CMake reports an error — the APK is never built but the step
          # appeared green.
          set -o pipefail

          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon \
            2>&1 | tee ../gradle-build.log

          # Explicit guard: fail loudly if the APK file is absent.
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK built successfully!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "ERROR: APK not found at expected path after build."
            echo "Check the gradle-build.log artifact for the real failure."
            exit 1
          fi

      - name: Find APK files
        if: always()
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" -type f -ls 2>/dev/null || echo "No APK files found."

      # ------------------------------------------------------------------ #
      # 13. Upload artifacts
      # ------------------------------------------------------------------ #
      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Android-Debug-APK
          path: AndroidProject/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            cmaj-generate.log
            gradle-build.log
          if-no-files-found: ignore

      # ------------------------------------------------------------------ #
      # 14. Build summary
      # ------------------------------------------------------------------ #
      - name: Write Build Summary
        if: always()
        run: |
          {
            echo "# Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| App | ${{ env.APP_NAME }} |"
            echo "| Runner | ubuntu-22.04 |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Date | $(date -u) |"
            echo ""
            if [ -f "AndroidProject/app/build/outputs/apk/debug/app-debug.apk" ]; then
              SZ=$(du -h "AndroidProject/app/build/outputs/apk/debug/app-debug.apk" | cut -f1)
              echo "**Status:** Build Successful"
              echo ""
              echo "APK size: $SZ"
            else
              echo "**Status:** APK not found — check build-logs artifact"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
