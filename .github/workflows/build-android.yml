name: Build Android App

on:
  workflow_dispatch:

env:
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download and extract Cmajor Linux tools
        run: |
          set -euo pipefail
          mkdir -p tools/cmajor

          archive_file="cmajor_linux_tools.tar.gz"
          candidate_urls=(
            "https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor_linux_x64.tar.gz"
            "https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor-linux-x64.tar.gz"
            "https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor_linux.tar.gz"
          )

          downloaded="false"
          for archive_url in "${candidate_urls[@]}"; do
            echo "Attempting Cmajor download: ${archive_url}"
            if curl -fL "${archive_url}" -o "${archive_file}"; then
              downloaded="true"
              break
            fi
          done

          if [ "${downloaded}" != "true" ]; then
            echo "Failed to download Cmajor Linux tools for version ${CMAJOR_VERSION}." >&2
            echo "Tried URLs:" >&2
            printf '  - %s\n' "${candidate_urls[@]}" >&2
            exit 1
          fi

          tar -xzf "${archive_file}" -C tools/cmajor

          cmaj_path="$(find "${GITHUB_WORKSPACE}/tools/cmajor" -type f -name cmaj | head -n 1)"
          if [ -z "${cmaj_path}" ]; then
            echo "Could not find cmaj executable after extraction" >&2
            exit 1
          fi

          chmod +x "${cmaj_path}"
          echo "CMAJ_PATH=${cmaj_path}" >> "$GITHUB_ENV"

      - name: Generate JUCE project for Android
        shell: bash
        run: |
          set -euo pipefail
          "$CMAJ_PATH" generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch

      - name: Build Android APK with Gradle
        run: |
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
