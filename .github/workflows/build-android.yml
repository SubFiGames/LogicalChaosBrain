name: Build Cmajor Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PATCH_FILE: "LogicalChaos.cmajorpatch"
  APP_NAME: "LogicalChaosMelodyMachine"
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-33 build-tools;33.0.0 platform-tools'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true
          link-to-sdk: true

      - name: Verify Android SDK Installation
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          which sdkmanager || echo "sdkmanager not in PATH"
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not found"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Checkout JUCE Framework
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: JUCE

      - name: Download and Install Cmajor CLI
        run: |
          # Download appropriate architecture
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            CMAJ_ARCH="x64"
          elif [ "$ARCH" = "aarch64" ]; then
            CMAJ_ARCH="arm64"
          else
            CMAJ_ARCH="x64"  # default to x64
          fi
          
          wget https://github.com/cmajor-lang/cmajor/releases/latest/download/cmajor.linux.${CMAJ_ARCH}.zip -O cmajor.zip
          unzip cmajor.zip -d cmajor-cli
          find cmajor-cli -name "cmaj" -type f -exec chmod +x {} \;
          
          # Find and add cmaj to PATH
          CMAJ_BIN=$(find cmajor-cli -name "cmaj" -type f | head -1)
          CMAJ_DIR=$(dirname "$CMAJ_BIN")
          echo "$CMAJ_DIR" >> $GITHUB_PATH
          echo "CMAJ_PATH=$CMAJ_BIN" >> $GITHUB_ENV

      - name: Verify Cmajor Installation
        run: |
          ${{ env.CMAJ_PATH }} --version || echo "Cmajor version check failed"

      - name: Fix Main.cmajor (std::math::pow issue)
        run: |
          # Fix the pow function call if it exists
          if grep -q "std::math::pow" Main.cmajor; then
            sed -i 's/std::math::pow/pow/g' Main.cmajor
            echo "Fixed std::math::pow to pow"
          fi

      - name: Generate JUCE Project from Cmajor Patch
        run: |
          ${{ env.CMAJ_PATH }} generate \
            --target=juce \
            --jucePath=${{ github.workspace }}/JUCE \
            ${{ env.PATCH_FILE }} \
            --output=GeneratedApp 2>&1 | tee cmaj-generate.log
          
          # Check if generation was successful
          if [ ! -d "GeneratedApp" ]; then
            echo "ERROR: JUCE project generation failed!"
            cat cmaj-generate.log
            exit 1
          fi

      - name: List Generated Files
        run: |
          echo "=== Generated App Structure ==="
          find GeneratedApp/ -type f | head -30
          echo "=== CMakeLists.txt ==="
          cat GeneratedApp/CMakeLists.txt || echo "CMakeLists.txt not found"

      - name: Create Android Studio Project Structure
        run: |
          # Create Android project structure
          mkdir -p AndroidProject/app/src/main/{cpp,java,res}
          mkdir -p AndroidProject/app/src/main/java/com/subfigames/logicalchaos
          
          # Copy generated JUCE code
          cp -r GeneratedApp/* AndroidProject/app/src/main/cpp/
          
          echo "Android project structure created"

      - name: Generate build.gradle files
        run: |
          # Root build.gradle
          cat > AndroidProject/build.gradle << 'EOFROOT'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOFROOT

          # App build.gradle
          cat > AndroidProject/app/build.gradle << 'EOFAPP'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.subfigames.logicalchaos.melodymachine'
              compileSdk 33
              ndkVersion "25.2.9519653"
          
              defaultConfig {
                  applicationId "com.subfigames.logicalchaos.melodymachine"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "4.0.0"
          
                  externalNativeBuild {
                      cmake {
                          cppFlags "-std=c++17 -frtti -fexceptions"
                          arguments "-DANDROID_STL=c++_shared",
                                    "-DANDROID_PLATFORM=android-24",
                                    "-DJUCE_PATH=${projectDir}/src/main/cpp/../../../../../../JUCE"
                      }
                  }
          
                  ndk {
                      abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
                  }
              }
          
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                      version "3.22.1"
                  }
              }
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOFAPP

          # settings.gradle
          cat > AndroidProject/settings.gradle << 'EOFSETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "LogicalChaosMelodyMachine"
          include ':app'
          EOFSETTINGS

          # gradle.properties
          cat > AndroidProject/gradle.properties << 'EOFPROPS'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOFPROPS

          echo "Gradle files created"

      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "${{ github.workspace }}/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create Gradle Wrapper
        run: |
          cd AndroidProject
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build APK with Gradle
        run: |
          cd AndroidProject
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../gradle-build.log || true
          
          # Check if build succeeded
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK built successfully!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "WARNING: APK not found. Build may have issues."
            echo "Check logs for details."
          fi

      - name: Find and List All APK Files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f -ls || echo "No APK files found"

      - name: Upload APK Artifact (if found)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Android-APK
          path: |
            AndroidProject/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            cmaj-generate.log
            gradle-build.log
          if-no-files-found: ignore

      - name: Create Build Summary
        if: always()
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App Name:** ${{ env.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "AndroidProject/app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h AndroidProject/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **Status:** APK Built Successfully" >> $GITHUB_STEP_SUMMARY
            echo "📦 **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Status:** Build completed but APK not found" >> $GITHUB_STEP_SUMMARY
            echo "See build logs for details" >> $GITHUB_STEP_SUMMARY
          fi
