name: Android CI (Option B - Template Host)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_API: "34"
      ANDROID_ABI: "arm64-v8a"
      HOST_REPO: "juce-framework/JUCE"
      HOST_REF: "master"

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v4

      - name: Checkout JUCE template host
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOST_REPO }}
          ref: ${{ env.HOST_REF }}
          path: host

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

          CMAJ=""
          while IFS= read -r candidate; do
            chmod +x "$candidate" || true
            if "$candidate" --version >/dev/null 2>&1; then
              CMAJ="$candidate"
              break
            fi
          done < <(find tools/cmajor -type f -name "cmaj" | sort)
          if [ -z "$CMAJ" ]; then
            echo "ERROR: runnable cmaj binary not found after extracting DMG"
            exit 1
          fi

          echo "CMAJ_PATH=$CMAJ" >> "$GITHUB_ENV"
          echo "CMAJ_BIN=$CMAJ" >> "$GITHUB_ENV"
          echo "Found cmaj at: $CMAJ"
          "$CMAJ" --version || true

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Generate JUCE project
        run: |
          set -e
          echo "Running: $CMAJ_BIN generate --target=juce"
          echo "JUCE path: $GITHUB_WORKSPACE/tools/JUCE"
          echo "Patch file:"
          cat LogicalChaos.cmajorpatch
          echo "Binary details:"
          echo "CMAJ_BIN=$CMAJ_BIN"
          file "$CMAJ_BIN" || true

          # Capture all output so the error is visible in the step log
          set +e
          "$CMAJ_BIN" generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch 2>&1
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "ERROR: cmaj generate failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "Discovered cmaj candidates:"
          find cmaj -type f \( -name cmaj -o -name cmaj.exe \) | sort

          CMAJ_BIN=""
          while IFS= read -r candidate; do
            chmod +x "$candidate" || true
            if "$candidate" --version >/dev/null 2>&1; then
              CMAJ_BIN="$candidate"
              break
            fi
          done < <(find cmaj -type f -name cmaj | sort)

          if [ -z "$CMAJ_BIN" ]; then
            echo "ERROR: no runnable Linux cmaj binary was found"
            exit 1
          fi

          echo "CMAJ_BIN=$CMAJ_BIN" >> "$GITHUB_ENV"
          echo "Selected cmaj: $CMAJ_BIN"
          file "$CMAJ_BIN" || true
          "$CMAJ_BIN" --version

      - name: Generate JUCE project from patch
        run: |
          set -euo pipefail
          "$CMAJ_BIN" generate --target=juce --output generated-juce LogicalChaos.cmajorpatch

      - name: Configure Android build via CMake
        run: |
          set -euo pipefail
          NDK_PATH="$ANDROID_NDK_ROOT"
          cmake -S generated-juce -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DANDROID_PLATFORM=android-${ANDROID_API} \
            -DANDROID_ABI=${ANDROID_ABI} \
            -DCMAKE_ANDROID_NDK="$NDK_PATH"

      - name: Build
        run: cmake --build build-android --config Release --parallel

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: android-build-output
          path: build-android
