name: Build Android App

on:
  workflow_dispatch:

env:
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  # ── Job 1: generate the JUCE CMake project on macOS ──────────────────────
  # cmaj uses Apple's native WebKit on macOS so it runs headlessly without
  # any display setup. On Linux it uses WebKit2GTK which requires a real
  # rendering event loop and hangs in every headless configuration.
  generate-juce-project:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Download Cmajor macOS tools
        run: |
          set -e
          mkdir -p tools/cmajor

          curl -L \
            "https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor.dmg" \
            -o cmajor.dmg

          hdiutil attach cmajor.dmg -mountpoint /Volumes/cmajor-install -nobrowse
          cp -R /Volumes/cmajor-install/* tools/cmajor/
          hdiutil detach /Volumes/cmajor-install

          CMAJ=$(find tools/cmajor -type f -name "cmaj" | head -1)
          chmod +x "$CMAJ"
          echo "CMAJ_PATH=$CMAJ" >> "$GITHUB_ENV"

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Generate JUCE project
        run: |
          set -e
          "$CMAJ_PATH" generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch

          echo "Generated project structure:"
          find GeneratedAndroidApp -type f | sort

      - name: Upload generated JUCE project
        uses: actions/upload-artifact@v4
        with:
          name: GeneratedJuceProject
          path: GeneratedAndroidApp

  # ── Job 2: compile for Android on Linux using the generated CMake project ─
  build-android:
    needs: generate-juce-project
    runs-on: ubuntu-22.04

    steps:
      - name: Download generated JUCE project
        uses: actions/download-artifact@v4
        with:
          name: GeneratedJuceProject
          path: GeneratedAndroidApp

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Show generated project structure
        run: |
          echo "Contents of GeneratedAndroidApp:"
          find GeneratedAndroidApp -type f | sort

      - name: Configure with CMake for Android
        run: |
          cmake \
            -S GeneratedAndroidApp \
            -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Android native library
        run: cmake --build build-android --parallel

      - name: Collect build output
        run: |
          mkdir -p artifact
          find build-android -name "*.so" -o -name "*.apk" | sort
          find build-android \( -name "*.so" -o -name "*.apk" \) -exec cp {} artifact/ \;
          echo "Artifact contents:"
          ls -lh artifact/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android
          path: artifact
