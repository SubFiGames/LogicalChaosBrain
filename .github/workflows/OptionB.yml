name: Android CI (Logical Chaos)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    env:
      PATCH_FILE: "LogicalChaos.cmajorpatch"
      ANDROID_ABI: "arm64-v8a"

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout JUCE Framework
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: JUCE

      - name: Install Cmajor CLI
        run: |
          # We use the direct link because it's much more stable than API scraping
          wget https://github.com/cmajor-lang/cmajor/releases/latest/download/cmajor.linux.x64.zip -O cmajor.zip
          unzip cmajor.zip -d cmajor-cli
          chmod +x cmajor-cli/bin/cmaj
          echo "${{ github.workspace }}/cmajor-cli/bin" >> $GITHUB_PATH

      - name: Generate JUCE Project from Patch
        run: |
          # This converts your .cmajorpatch into actual C++ source code
          cmaj generate \
            --target=juce \
            --jucePath=${{ github.workspace }}/JUCE \
            ${{ env.PATCH_FILE }} \
            --output=GeneratedApp

      - name: Configure CMake for Android
        run: |
          # $ANDROID_NDK_LATEST_HOME is built into the GitHub runner
          cmake -B build -S GeneratedApp \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_ANDROID_ARCH_ABI=${{ env.ANDROID_ABI }} \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared

      - name: Build APK
        run: |
          cmake --build build --config Release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-APK
          path: build/**/*.apk
          fi
          CANDIDATE=$(find cmaj -type f \( -name cmaj -o -name cmaj.exe \) | head -n1)
          chmod +x "$CANDIDATE"
          echo "CMAJ_BIN=$CANDIDATE" >> $GITHUB_ENV

      - name: Generate JUCE project from patch
        run: |
          "$CMAJ_BIN" generate --target=juce --output generated-juce LogicalChaos.cmajorpatch

      - name: Configure Android build via CMake
        run: |
          NDK_PATH="$ANDROID_NDK_ROOT"
          cmake -S generated-juce -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DANDROID_PLATFORM=android-${ANDROID_API} \
            -DANDROID_ABI=${ANDROID_ABI} \
            -DCMAKE_ANDROID_NDK="$NDK_PATH"

      - name: Build
        run: cmake --build build-android --config Release --parallel

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: android-build-output
          path: build-android
