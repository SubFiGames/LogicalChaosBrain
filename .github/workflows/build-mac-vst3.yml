name: Build macOS VST3

'on':
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
jobs:
  build-macos-vst3:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install cmake ninja jq || true

      - name: Download Cmajor macOS tools
        shell: bash
        run: |
          set -e

          mkdir -p tools/cmajor

          echo "Fetching Cmajor release list with authenticated GitHub API..."

          curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "User-Agent: logical-chaos-build" \
            https://api.github.com/repos/SoundStacks/cmajor/releases \
            -o releases.json

          echo "GitHub response preview:"
          head -c 500 releases.json
          echo ""

          echo "Searching for macOS downloadable asset..."

          ASSET_URL=$(jq -r '
            if type == "array" then
              [
                .[].assets[]
                | select(
                    (.name | test("mac|osx|darwin"; "i"))
                    and
                    (.name | test("zip|tar|gz|dmg"; "i"))
                  )
                | .browser_download_url
              ][0]
            else
              empty
            end
          ' releases.json)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Could not find a macOS Cmajor release asset."
            echo "Full GitHub API response:"
            cat releases.json
            exit 1
          fi

          echo "Downloading:"
          echo "$ASSET_URL"

          curl -L "$ASSET_URL" -o cmajor-macos.zip

          echo "Extracting Cmajor..."
          unzip -q cmajor-macos.zip -d tools/cmajor

          echo "Cmajor files:"
          find tools/cmajor -maxdepth 4 -type f | head -100      - name: Find cmaj executable
        run: |
          set -e

          CMAJ_PATH=$(find tools/cmajor -type f -name "cmaj" | head -1)

          if [ -z "$CMAJ_PATH" ]; then
            echo "Could not find cmaj executable."
            echo "Files found:"
            find tools/cmajor -maxdepth 5 -type f
            exit 1
          fi

          chmod +x "$CMAJ_PATH"
          echo "CMAJ_PATH=$CMAJ_PATH" >> "$GITHUB_ENV"

          echo "Using cmaj at:"
          echo "$CMAJ_PATH"

          "$CMAJ_PATH" --help || true

      - name: Export Cmajor patch as JUCE plugin
        run: |
          set -e

          "$CMAJ_PATH" export --target=juce LogicalChaos.cmajorpatch --output=GeneratedPlugin

          echo "Generated project:"
          find GeneratedPlugin -maxdepth 4 -type f | head -100

      - name: Build generated Xcode project
        run: |
          set -e

          XCODEPROJ=$(find GeneratedPlugin -name "*.xcodeproj" | head -1)

          if [ -z "$XCODEPROJ" ]; then
            echo "No Xcode project found."
            find GeneratedPlugin -maxdepth 5 -type f
            exit 1
          fi

          echo "Found Xcode project:"
          echo "$XCODEPROJ"

          xcodebuild \
            -project "$XCODEPROJ" \
            -configuration Release \
            -scheme "LogicalChaos" \
            build

      - name: Collect VST3
        run: |
          set -e

          mkdir -p artifact

          echo "Searching for built VST3..."
          find GeneratedPlugin -name "*.vst3" -print

          VST3_PATH=$(find GeneratedPlugin -name "*.vst3" | head -1)

          if [ -z "$VST3_PATH" ]; then
            echo "No VST3 was built."
            exit 1
          fi

          cp -R "$VST3_PATH" artifact/

          echo "Artifact contents:"
          find artifact -maxdepth 3 -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-macOS-VST3
          path: artifact
