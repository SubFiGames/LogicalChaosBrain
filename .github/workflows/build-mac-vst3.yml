name: Build Android App

on:
  workflow_dispatch:

env:
  # Check the Cmajor GitHub releases to ensure this version exists!
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone JUCE
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

            - name: Download and extract Cmajor Linux tools
        run: |
          mkdir -p tools/cmajor
          # Updated URL with the correct repo name and file pattern
          URL="https://github.com/cmajor-lang/cmajor/releases/download/${{ env.CMAJOR_VERSION }}/cmajor_linux_x64.zip"
          
          echo "Downloading from $URL"
          curl -L $URL -o cmajor.zip
          
          # Safety check: ensure we didn't just download a '404 Not Found' page
          FILESIZE=$(stat -c%s "cmajor.zip")
          if [ $FILESIZE -lt 100000 ]; then
              echo "Error: Download failed. Check if version ${{ env.CMAJOR_VERSION }} is correct."
              exit 1
          fi
          
          unzip cmajor.zip -d tools/cmajor
          
          # This command finds the 'cmaj' binary wherever it was unzipped
          CMAJ_EXEC=$(find tools/cmajor -name "cmaj" -type f -executable | head -n 1)
          chmod +x "$CMAJ_EXEC"
          
          # Save the absolute path for the next steps
          echo "CMAJ_PATH=$(pwd)/$CMAJ_EXEC" >> $GITHUB_ENV
          echo "Found cmaj at: $CMAJ_EXEC"

      - name: Generate JUCE project for Android
        run: |
          # Use the environment variable we just saved
          $CMAJ_PATH generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath=$GITHUB_WORKSPACE/tools/JUCE \
            LogicalChaos.cmajorpatch

      - name: Build Android APK with Gradle
        run: |
          # Cmajor creates the Android build files inside this specific subfolder
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug


      - name: Build Android APK with Gradle
        run: |
          # The cmaj generator creates a 'Builds/Android' subfolder
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
