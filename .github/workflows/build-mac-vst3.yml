name: Build macOS VST3

'on':
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos-vst3:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install cmake ninja jq
        - name: Download latest Cmajor macOS release
        run: |
          mkdir -p tools/cmajor

          echo "Getting Cmajor releases from GitHub..."
          curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: logical-chaos-build" \
            https://api.github.com/repos/SoundStacks/cmajor/releases \
            -o releases.json

          echo "GitHub response preview:"
          head -c 500 releases.json
          echo ""

          echo "Available release assets:"
          jq -r '.[0].assets[].name' releases.json

          CMAJ_URL=$(jq -r '.[0].assets[]
            | select(.name | test("(?i)(mac|macos|darwin|osx).*\\.(zip|tar\\.gz)$"))
            | .browser_download_url' releases.json | head -n 1)

          echo "Selected Cmajor asset URL:"
          echo "$CMAJ_URL"

          if [ -z "$CMAJ_URL" ] || [ "$CMAJ_URL" = "null" ]; then
            echo "Could not find a macOS Cmajor zip/tar.gz asset."
            echo "Here are all assets GitHub returned:"
            jq -r '.[0].assets[] | "\(.name) -> \(.browser_download_url)"' releases.json
            exit 1
          fi

          curl -L "$CMAJ_URL" -o cmajor-download

          echo "Downloaded file type:"
          file cmajor-download

          if file cmajor-download | grep -qi "zip"; then
            mv cmajor-download cmajor-download.zip
            unzip -t cmajor-download.zip
            unzip cmajor-download.zip -d tools/cmajor
          elif file cmajor-download | grep -qi "gzip"; then
            mv cmajor-download cmajor-download.tar.gz
            tar -xzf cmajor-download.tar.gz -C tools/cmajor
          else
            echo "Downloaded file is not a zip or tar.gz."
            exit 1
          fi

          find tools/cmajor -type f -name "cmaj" -exec chmod +x {} \;
          echo "Found cmaj executable:"
          find tools/cmajor -type f -name "cmaj"
      - name: Export Cmajor patch as JUCE plugin
        run: |
          CMAJ=$(find "$PWD/tools/cmajor" -type f -name "cmaj" | head -n 1)
          echo "Using cmaj: $CMAJ"

          if [ -z "$CMAJ" ]; then
            echo "Could not find cmaj executable after unzipping Cmajor."
            find tools/cmajor -maxdepth 5 -type f
            exit 1
          fi

          "$CMAJ" generate --target=juce LogicalChaos.cmajorpatch --output=Build/JUCEPlugin

      - name: Show generated project
        run: |
          find Build/JUCEPlugin -maxdepth 6 -type f

      - name: Build generated Xcode project
        run: |
          XCODEPROJ=$(find Build/JUCEPlugin -name "*.xcodeproj" | head -n 1)
          echo "Xcode project: $XCODEPROJ"

          if [ -z "$XCODEPROJ" ]; then
            echo "No Xcode project found."
            find Build/JUCEPlugin -maxdepth 6 -type f
            exit 1
          fi

          xcodebuild \
            -project "$XCODEPROJ" \
            -configuration Release \
            -alltargets \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Collect VST3
        run: |
          mkdir -p artifact
          VST3=$(find Build/JUCEPlugin -name "*.vst3" | head -n 1)
          echo "Found VST3: $VST3"

          if [ -z "$VST3" ]; then
            echo "No VST3 file was found."
            find Build/JUCEPlugin -maxdepth 8 -type d
            exit 1
          fi

          cp -R "$VST3" artifact/

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-macOS-VST3
          path: artifact
