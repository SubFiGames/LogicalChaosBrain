name: Build macOS VST3

'on':
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-macos-vst3:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          set -e
          brew install cmake ninja jq || true

      - name: Clone JUCE
        shell: bash
        run: |
          set -e
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download Cmajor macOS tools
        shell: bash
        run: |
          set -e

          mkdir -p tools/cmajor

          echo "Fetching Cmajor release list with authenticated GitHub API..."

          curl -L \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "User-Agent: logical-chaos-build" \
          -o releases.json \
          https://api.github.com/repos/cmajor-lang/cmajor/releases


          echo "GitHub response preview:"
          head -c 500 releases.json
          echo ""

          echo "Searching for macOS downloadable asset..."

          ASSET_URL=$(jq -r '
            if type == "array" then
              [
                .[].assets[]
                | select(
                    (.name | test("mac|osx|darwin|apple"; "i"))
                    and
                    (.name | test("zip|tar|gz"; "i"))
                  )
                | .browser_download_url
              ][0]
            else
              empty
            end
          ' releases.json)

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Could not find a macOS Cmajor release asset."
            echo "Full GitHub API response:"
            cat releases.json
            exit 1
          fi

          echo "Downloading:"
          echo "$ASSET_URL"

          curl -L "$ASSET_URL" -o cmajor-macos-archive

          echo "Extracting Cmajor..."

          if file cmajor-macos-archive | grep -qi "Zip"; then
            unzip -q cmajor-macos-archive -d tools/cmajor
          else
            tar -xf cmajor-macos-archive -C tools/cmajor
          fi

          echo "Cmajor files:"
          find tools/cmajor -maxdepth 5 -type f | head -150

      - name: Find cmaj executable
        shell: bash
        run: |
          set -e

          CMAJ_PATH=$(find tools/cmajor -type f -name "cmaj" | head -1)

          if [ -z "$CMAJ_PATH" ]; then
            echo "Could not find cmaj executable."
            echo "Files found:"
            find tools/cmajor -maxdepth 6 -type f
            exit 1
          fi

          chmod +x "$CMAJ_PATH"
          echo "CMAJ_PATH=$CMAJ_PATH" >> "$GITHUB_ENV"

          echo "Using cmaj at:"
          echo "$CMAJ_PATH"

          "$CMAJ_PATH" --help || true

      - name: Validate required project files
        shell: bash
        run: |
          set -e

          echo "Repo files:"
          find . -maxdepth 3 -type f | sort

          test -f LogicalChaos.cmajorpatch
          test -f Main.cmajor
          test -f view.js

      - name: Generate JUCE project from Cmajor patch
        shell: bash
        run: |
          set -e

          "$CMAJ_PATH" generate \
            --target=juce \
            --output=GeneratedPlugin \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch

          echo "Generated project:"
          find GeneratedPlugin -maxdepth 5 -type f | head -200

      - name: Configure generated plugin
        shell: bash
        run: |
          set -e

          cmake \
            -S GeneratedPlugin \
            -B build \
            -G Xcode \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build generated plugin
        shell: bash
        run: |
          set -e

          cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: bash
        run: |
          set -e

          mkdir -p artifact

          echo "Searching for built VST3..."
          find build -name "*.vst3" -print

          VST3_PATH=$(find build -name "*.vst3" | head -1)

          if [ -z "$VST3_PATH" ]; then
            echo "No VST3 was built."
            echo "Build folder:"
            find build -maxdepth 6 -type f | head -300
            exit 1
          fi

          echo "Found VST3:"
          echo "$VST3_PATH"

          cp -R "$VST3_PATH" artifact/

          echo "Ad-hoc signing VST3..."
          codesign --force --deep --sign - artifact/*.vst3 || true

          echo "Artifact contents:"
          find artifact -maxdepth 4 -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-macOS-VST3
          path: artifact
