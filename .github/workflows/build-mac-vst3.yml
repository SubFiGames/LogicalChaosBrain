name: Build Android App

on:
  workflow_dispatch:

env:
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone JUCE
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

            - name: Download and extract Cmajor Linux tools
        run: |
          mkdir -p tools/cmajor
          
          # We use -L to follow redirects and -O to specify the output filename
          # Attempting to download the Linux binary directly
          URL="https://github.com/cmajor-lang/cmajor/releases/download/${{ env.CMAJOR_VERSION }}/cmajor_linux_x64.zip"
          
          echo "Downloading from $URL"
          curl -L $URL -o cmajor.zip
          
          # Debug: check the file size and type
          ls -lh cmajor.zip
          file cmajor.zip
          
          # Check if the file is suspiciously small (under 100KB)
          FILESIZE=$(stat -c%s "cmajor.zip")
          if [ $FILESIZE -lt 100000 ]; then
              echo "Error: The downloaded file is too small ($FILESIZE bytes). The URL might be wrong."
              cat cmajor.zip # Print the content to see the error message from GitHub
              exit 1
          fi
          
          unzip cmajor.zip -d tools/cmajor
          
          # Find the cmaj binary (it might be in a subfolder after unzipping)
          CMAJ_EXEC=$(find $GITHUB_WORKSPACE/tools/cmajor -name "cmaj" -type f)
          chmod +x $CMAJ_EXEC
          echo "CMAJ_PATH=$CMAJ_EXEC" >> $GITHUB_ENV
          echo "Found cmaj at: $CMAJ_EXEC"


      - name: Validate required project files
        run: |
          ls -R
          test -f LogicalChaos.cmajorpatch || exit 1
          test -f Main.cmajor || exit 1

      - name: Generate JUCE project for Android
        run: |
          $CMAJ_PATH generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath=$GITHUB_WORKSPACE/tools/JUCE \
            LogicalChaos.cmajorpatch

      - name: Build Android APK with Gradle
        run: |
          # Navigate to the Android build folder generated by Cmajor/JUCE
          # Standard Cmajor JUCE export creates a 'Builds/Android' directory
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
