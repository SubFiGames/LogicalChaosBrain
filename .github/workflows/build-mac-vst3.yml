name: Build macOS VST3

'on':
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-macos-vst3:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          set -e
          brew install cmake ninja jq || true

      - name: Clone JUCE
        shell: bash
        run: |
          set -e
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download Cmajor macOS tools
        shell: bash
        run: |
          set -e

          mkdir -p tools/cmajor

          echo "Downloading Cmajor macOS DMG..."

          # Direct DMG download with SHA256 verification
          DMG_URL="https://github.com/cmajor-lang/cmajor/releases/download/1.0.3096/cmajor.dmg"
          DMG_FILE="cmajor-mac.dmg"
          EXPECTED_SHA256="113bd1d487530b97d4eb5a740da562c3cee1066444f5fb66e8a8fdec64422c21"

          curl -L "$DMG_URL" -o "$DMG_FILE"

          # Verify SHA256
          ACTUAL_SHA256=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "SHA256 mismatch!"
            echo "Expected: $EXPECTED_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            exit 1
          fi

          echo "SHA256 verified successfully"
          echo "Mounting and extracting DMG..."

          # Mount DMG
          hdiutil attach "$DMG_FILE" -mountpoint /Volumes/cmajor-install -nobrowse

          # Copy to tools directory
          cp -R /Volumes/cmajor-install/* tools/cmajor/

          # Unmount
          hdiutil detach /Volumes/cmajor-install

          echo "Cmajor files:"
          find tools/cmajor -maxdepth 5 -type f | head -150

      - name: Find cmaj executable
        shell: bash
        run: |
          set -e

          CMAJ_PATH=$(find tools/cmajor -type f -name "cmaj" | head -1)

          if [ -z "$CMAJ_PATH" ]; then
            echo "Could not find cmaj executable."
            echo "Files found:"
            find tools/cmajor -maxdepth 6 -type f
            exit 1
          fi

          chmod +x "$CMAJ_PATH"
          echo "CMAJ_PATH=$CMAJ_PATH" >> "$GITHUB_ENV"

          echo "Using cmaj at:"
          echo "$CMAJ_PATH"

          "$CMAJ_PATH" --help || true

      - name: Validate required project files
        shell: bash
        run: |
          set -e

          echo "Repo files:"
          find . -maxdepth 3 -type f | sort

          test -f LogicalChaos.cmajorpatch
          test -f Main.cmajor
          test -f view.js

      - name: Generate JUCE project from Cmajor patch
        shell: bash
        run: |
          set -e

          "$CMAJ_PATH" generate \
            --target=juce \
            --output=GeneratedPlugin \
            --jucePath="$GITHUB_WORKSPACE/tools/JUCE" \
            LogicalChaos.cmajorpatch

          echo "Generated project:"
          find GeneratedPlugin -maxdepth 5 -type f | head -200

      - name: Configure generated plugin
        shell: bash
        run: |
          set -e

          cmake \
            -S GeneratedPlugin \
            -B build \
            -G Xcode \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build generated plugin
        shell: bash
        run: |
          set -e

          cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: bash
        run: |
          set -e

          mkdir -p artifact

          echo "Searching for built VST3..."
          find build -name "*.vst3" -print

          VST3_PATH=$(find build -name "*.vst3" | head -1)

          if [ -z "$VST3_PATH" ]; then
            echo "No VST3 was built."
            echo "Build folder:"
            find build -maxdepth 6 -type f | head -300
            exit 1
          fi

          echo "Found VST3:"
          echo "$VST3_PATH"

          cp -R "$VST3_PATH" artifact/

          echo "Ad-hoc signing VST3..."
          codesign --force --deep --sign - artifact/*.vst3 || true

          echo "Artifact contents:"
          find artifact -maxdepth 4 -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-macOS-VST3
          path: artifact
