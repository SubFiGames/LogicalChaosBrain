name: Build macOS VST3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-vst3:
    runs-on: macos-14

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Steinberg VST3 SDK
        uses: actions/checkout@v4
        with:
          repository: steinbergmedia/vst3sdk
          submodules: recursive
          path: tools/vst3sdk

      - name: Validate fallback VST files
        shell: bash
        run: |
          set -e

          test -f vst3/CMakeLists.txt
          test -f vst3/LogicalChaosVST3.cpp
          test -f src/LogicalChaosEngine.h
          test -f src/LogicalChaosEngine.cpp
          test -f tools/vst3sdk/CMakeLists.txt

          echo "Fallback VST3 files are present."

      - name: Configure fallback VST3
        shell: bash
        run: |
          set -e

          cmake \
            -S vst3 \
            -B build-vst3 \
            -G "Unix Makefiles" \
            -DVST3_SDK_ROOT="$GITHUB_WORKSPACE/tools/vst3sdk" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build fallback VST3
        shell: bash
        run: |
          set -e
          cmake --build build-vst3 --parallel

      - name: Collect VST3
        shell: bash
        run: |
          set -e

          mkdir -p artifact

          echo "Searching for built VST3..."
          find build-vst3 -name "*.vst3" -type d -print

          VST3_PATH=$(find build-vst3 -name "*.vst3" -type d | head -1)

          if [ -z "$VST3_PATH" ]; then
            echo "No VST3 was built."
            find build-vst3 -maxdepth 8 -print | head -800
            exit 1
          fi

          echo "Found VST3: $VST3_PATH"
          cp -R "$VST3_PATH" artifact/

          echo "Ad-hoc signing VST3 bundle..."
          codesign --force --deep --sign - "artifact/$(basename "$VST3_PATH")"

          echo "Verifying ad-hoc signature..."
          codesign --verify --deep --strict --verbose=2 "artifact/$(basename "$VST3_PATH")"

          echo "Artifact contents:"
          find artifact -maxdepth 5 -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Fallback-macOS-VST3
          path: artifact
