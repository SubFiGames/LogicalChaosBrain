name: Build Android App

on:
  workflow_dispatch:

env:
  # Check the Cmajor GitHub releases to ensure this version exists!
  CMAJOR_VERSION: 1.0.3096
  JAVA_VERSION: '17'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone JUCE
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

                  - name: Download and extract Cmajor Windows tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path tools/cmajor | Out-Null

          # Download
          $exeUrl  = "https://github.com/cmajor-lang/cmajor/releases/download/$env:CMAJOR_VERSION/cmajor_win_x64.exe"
          $exeFile = "cmajor_win_x64.exe"
          Write-Host "Downloading Cmajor Windows tools from: $exeUrl"
          Invoke-WebRequest -Uri $exeUrl -OutFile $exeFile

          if (-not (Test-Path $exeFile)) {
            Write-Error "Cmajor download failed."
            exit 1
          }

          # Find 7-Zip
          $sevenZip = $null
          $possible7ZipPaths = @("C:\Program Files\7-Zip\7z.exe", "C:\Program Files (x86)\7-Zip\7z.exe")
          foreach ($path in $possible7ZipPaths) { if (Test-Path $path) { $sevenZip = $path; break } }
          
          if (-not $sevenZip) {
            Write-Host "Installing 7-Zip via Chocolatey..."
            choco install 7zip -y --no-progress
            $sevenZip = (where.exe 7z 2>$null)[0]
          }

          if (-not $sevenZip) { Write-Error "Could not find 7-Zip"; exit 1 }

          # Extract
          Write-Host "Extracting Cmajor tools using $sevenZip..."
          & $sevenZip x $exeFile "-otools\cmajor" -y
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Extraction failed. Exit code: $LASTEXITCODE"
            exit 1
          }


      - name: Generate JUCE project for Android
        run: |
          # Use the environment variable we just saved
          $CMAJ_PATH generate \
            --target=juce \
            --output=GeneratedAndroidApp \
            --jucePath=$GITHUB_WORKSPACE/tools/JUCE \
            LogicalChaos.cmajorpatch

      - name: Build Android APK with Gradle
        run: |
          # Cmajor creates the Android build files inside this specific subfolder
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug


      - name: Build Android APK with Gradle
        run: |
          # The cmaj generator creates a 'Builds/Android' subfolder
          cd GeneratedAndroidApp/Builds/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Android-Debug
          path: GeneratedAndroidApp/Builds/Android/app/build/outputs/apk/debug/*.apk
