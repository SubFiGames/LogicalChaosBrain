name: Build Windows VST3

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CMAJOR_VERSION: 1.0.3096

permissions:
  contents: read

jobs:
  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Clone JUCE
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download and Install Cmajor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exeUrl = "https://github.com/cmajor-lang/cmajor/releases/download/$env:CMAJOR_VERSION/cmajor_win_x64.exe"
          $installer = "cmajor_installer.exe"
          $installDir = "$env:GITHUB_WORKSPACE\tools\cmajor"

          Write-Host "Downloading Cmajor installer from: $exeUrl"
          Invoke-WebRequest -Uri $exeUrl -OutFile $installer

          if (-not (Test-Path $installer)) { exit 1 }

          Write-Host "Running Cmajor silent installation..."
          $process = Start-Process -FilePath ".\$installer" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /DIR=`"$installDir`"" -Wait -PassThru
          Start-Sleep -Seconds 2

          $cmaj = Get-ChildItem -Path $installDir -Recurse -Filter "cmaj.exe" | Select-Object -First 1
          if (-not $cmaj) { exit 1 }
          
          "CMAJ_PATH=$($cmaj.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAJ_DIR=$($cmaj.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify cmaj executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PATH = "$env:CMAJ_DIR;" + $env:PATH
          & "$env:CMAJ_PATH" help
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
      - name: Validate required project files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $requiredFiles = @("LogicalChaos.cmajorpatch", "Main.cmajor", "view.js")
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) { exit 1 }
          }

      - name: Generate JUCE project and Copy Assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $jucePath = Join-Path $env:GITHUB_WORKSPACE "tools\JUCE"
          if (Test-Path "GeneratedPlugin") { Remove-Item "GeneratedPlugin" -Recurse -Force }

          # 1. Generate the project
          & $env:CMAJ_PATH generate --target=juce --output=GeneratedPlugin "--jucePath=$jucePath" LogicalChaos.cmajorpatch
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # 2. Embed the GUI files so they aren't missing!
          Copy-Item "LogicalChaos.cmajorpatch" "GeneratedPlugin/Source/" -Force
          Copy-Item "Main.cmajor" "GeneratedPlugin/Source/" -Force
          Copy-Item "view.js" "GeneratedPlugin/Source/" -Force

      - name: Configure generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake -S GeneratedPlugin -B build -G "Visual Studio 17 2022" -A x64

      - name: Build generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "*.vst3" | Select-Object -First 1
          if (-not $vst3) { exit 1 }
          Copy-Item $vst3.FullName -Destination artifact -Recurse -Force

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: LogicalChaos-Windows-VST3
          path: artifact
