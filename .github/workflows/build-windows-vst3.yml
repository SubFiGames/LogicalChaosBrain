name: Build Windows VST3

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CMAJOR_VERSION: 1.0.3096

permissions:
  contents: read

jobs:
  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Clone JUCE
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Download and extract Cmajor tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          # 1. Setup paths
          $zipUrl = "https://github.com/cmajor-lang/cmajor/releases/download/$env:CMAJOR_VERSION/cmajor_win_x64.zip"
          $zipFile = "cmajor_tools.zip"
          $extractDir = "$env:GITHUB_WORKSPACE\tools\cmajor"
          
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null

          # 2. Download the ZIP (not the .exe installer)
          Write-Host "Downloading Cmajor ZIP from: $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile

          # 3. Extract using native PowerShell
          Write-Host "Extracting to $extractDir..."
          Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force

          # 4. Find the actual cmaj.exe (it's usually in a subfolder like 'bin' or 'cmajor')
          $cmaj = Get-ChildItem -Path $extractDir -Recurse -Filter "cmaj.exe" | Select-Object -First 1

          if (-not $cmaj) {
            Write-Error "Could not find cmaj.exe inside the extracted ZIP."
            Get-ChildItem -Path $extractDir -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          # 5. Set environment variables for later steps
          $cmajPath = $cmaj.FullName
          $cmajDir = $cmaj.DirectoryName
          
          Write-Host "Found cmaj.exe at: $cmajPath"
          "CMAJ_PATH=$cmajPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAJ_DIR=$cmajDir"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify cmaj executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Add the directory to PATH so cmaj can find its DLLs (like CmajPerformer.dll)
          $env:PATH = "$env:CMAJ_DIR;" + $env:PATH
          
          Write-Host "Testing cmaj help..."
          & "$env:CMAJ_PATH" help
          
      - name: Validate required project files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Repo files:"
          Get-ChildItem -Path . -Recurse -File |
            Select-Object -First 300 |
            ForEach-Object { Write-Host $_.FullName }

          $requiredFiles = @(
            "LogicalChaos.cmajorpatch",
            "Main.cmajor",
            "view.js"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing required file: $file"
              exit 1
            }
          }

          Write-Host "All required project files are present."

      - name: Generate JUCE project from Cmajor patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $jucePath = Join-Path $env:GITHUB_WORKSPACE "tools\JUCE"

          if (Test-Path "GeneratedPlugin") {
            Remove-Item "GeneratedPlugin" -Recurse -Force
          }

          Write-Host "Generating JUCE project..."
          Write-Host "Cmajor: $env:CMAJ_PATH"
          Write-Host "JUCE:   $jucePath"

          & $env:CMAJ_PATH generate `
            --target=juce `
            --output=GeneratedPlugin `
            "--jucePath=$jucePath" `
            LogicalChaos.cmajorpatch

          if ($LASTEXITCODE -ne 0) {
            Write-Error "cmaj generate failed with exit code $LASTEXITCODE"
            exit 1
          }

          if (-not (Test-Path "GeneratedPlugin\CMakeLists.txt")) {
            Write-Error "GeneratedPlugin/CMakeLists.txt was not created."
            Get-ChildItem -Path GeneratedPlugin -Recurse |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Generated project:"
          Get-ChildItem -Path GeneratedPlugin -Recurse |
            Select-Object -First 300 |
            ForEach-Object { Write-Host $_.FullName }

      - name: Configure generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake `
            -S GeneratedPlugin `
            -B build `
            -G "Visual Studio 17 2022" `
            -A x64

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configure failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Build generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake --build build --config Release --parallel

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Collect VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Write-Host "Searching for built VST3..."
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "*.vst3" |
            Select-Object -First 1

          if (-not $vst3) {
            Write-Error "No VST3 bundle was built."
            Write-Host "Build folder contents:"
            Get-ChildItem -Path build -Recurse |
              Select-Object -First 500 |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found VST3:"
          Write-Host $vst3.FullName

          Copy-Item $vst3.FullName -Destination artifact -Recurse -Force

          Write-Host "Artifact contents:"
          Get-ChildItem -Path artifact -Recurse |
            ForEach-Object { Write-Host $_.FullName }

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: LogicalChaos-Windows-VST3
          path: artifact
