name: Build Windows VST3

on:
  workflow_dispatch:

env:
  CMAJOR_VERSION: 1.0.3096

permissions:
  contents: read

jobs:
  build-windows-vst3:
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Clone JUCE
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path tools | Out-Null

          if (Test-Path "tools\JUCE") {
            Remove-Item "tools\JUCE" -Recurse -Force
          }

          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

          if (-not (Test-Path "tools\JUCE\CMakeLists.txt")) {
            Write-Error "JUCE clone failed. tools/JUCE/CMakeLists.txt was not found."
            exit 1
          }

      - name: Download and extract Cmajor Windows tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path tools/cmajor | Out-Null

          $exeUrl  = "https://github.com/cmajor-lang/cmajor/releases/download/$env:CMAJOR_VERSION/cmajor_win_x64.exe"
          $exeFile = "cmajor_win_x64.exe"

          Write-Host "Downloading Cmajor Windows tools from:"
          Write-Host $exeUrl

          Invoke-WebRequest -Uri $exeUrl -OutFile $exeFile

          if (-not (Test-Path $exeFile)) {
            Write-Error "Cmajor download failed. File was not created."
            exit 1
          }

          $downloaded = Get-Item $exeFile
          Write-Host "Downloaded file:"
          Write-Host "Path: $($downloaded.FullName)"
          Write-Host "Size: $($downloaded.Length) bytes"

          if ($downloaded.Length -lt 1000000) {
            Write-Error "Downloaded file is suspiciously small. GitHub may have returned an error page instead of the installer."
            Get-Content $exeFile -TotalCount 20
            exit 1
          }

          Write-Host "Looking for 7-Zip..."

          $sevenZip = $null
          $possible7ZipPaths = @(
            "C:\Program Files\7-Zip\7z.exe",
            "C:\Program Files (x86)\7-Zip\7z.exe"
          )

          foreach ($path in $possible7ZipPaths) {
            if (Test-Path $path) {
              $sevenZip = $path
              break
            }
          }

          if (-not $sevenZip) {
            Write-Host "7-Zip was not found in the usual folders. Trying PATH..."
            $found7z = where.exe 7z 2>$null

            if ($LASTEXITCODE -eq 0 -and $found7z) {
              $sevenZip = $found7z[0]
            }
          }

          if (-not $sevenZip) {
            Write-Host "7-Zip was not found. Installing with Chocolatey..."
            choco install 7zip -y --no-progress

            $found7z = where.exe 7z 2>$null

            if ($LASTEXITCODE -eq 0 -and $found7z) {
              $sevenZip = $found7z[0]
            }
          }

          if (-not $sevenZip) {
            Write-Error "Could not find or install 7-Zip."
            exit 1
          }

          Write-Host "Using 7-Zip:"
          Write-Host $sevenZip

          Write-Host "Extracting Cmajor tools..."
          & $sevenZip x $exeFile "-otools\cmajor" -y

          if ($LASTEXITCODE -ne 0) {
            Write-Error "7-Zip failed to extract the Cmajor installer. Exit code: $LASTEXITCODE"
            exit 1
          }

          Write-Host "Extraction completed. Extracted contents:"
          Get-ChildItem -Path tools/cmajor -Recurse |
            Select-Object -First 200 |
            ForEach-Object { Write-Host $_.FullName }

      - name: Find and verify cmaj executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $cmaj = Get-ChildItem -Path tools/cmajor -Recurse -Filter "cmaj.exe" |
            Select-Object -First 1

          if (-not $cmaj) {
            Write-Error "Could not find cmaj.exe after extraction."
            Write-Host "Full extracted folder listing:"
            Get-ChildItem -Path tools/cmajor -Recurse |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found cmaj.exe at:"
          Write-Host $cmaj.FullName

          "CMAJ_PATH=$($cmaj.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAJ_DIR=$($cmaj.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $env:PATH = "$($cmaj.DirectoryName);" + $env:PATH

          Write-Host "Testing cmaj..."
          & $cmaj.FullName help

          if ($LASTEXITCODE -ne 0) {
            Write-Error "cmaj help failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Validate required project files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Repo files:"
          Get-ChildItem -Path . -Recurse -File |
            Select-Object -First 300 |
            ForEach-Object { Write-Host $_.FullName }

          $requiredFiles = @(
            "LogicalChaos.cmajorpatch",
            "Main.cmajor",
            "view.js"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing required file: $file"
              exit 1
            }
          }

          Write-Host "All required project files are present."

      - name: Generate JUCE project from Cmajor patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $env:PATH = "$env:CMAJ_DIR;" + $env:PATH
          $jucePath = Join-Path $env:GITHUB_WORKSPACE "tools\JUCE"

          if (Test-Path "GeneratedPlugin") {
            Remove-Item "GeneratedPlugin" -Recurse -Force
          }

          Write-Host "Generating JUCE project..."
          Write-Host "Cmajor: $env:CMAJ_PATH"
          Write-Host "JUCE:   $jucePath"

          & $env:CMAJ_PATH generate `
            --target=juce `
            --output=GeneratedPlugin `
            "--jucePath=$jucePath" `
            LogicalChaos.cmajorpatch

          if ($LASTEXITCODE -ne 0) {
            Write-Error "cmaj generate failed with exit code $LASTEXITCODE"
            exit 1
          }

          if (-not (Test-Path "GeneratedPlugin\CMakeLists.txt")) {
            Write-Error "GeneratedPlugin/CMakeLists.txt was not created."
            Get-ChildItem -Path GeneratedPlugin -Recurse |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Generated project:"
          Get-ChildItem -Path GeneratedPlugin -Recurse |
            Select-Object -First 300 |
            ForEach-Object { Write-Host $_.FullName }

      - name: Configure generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake `
            -S GeneratedPlugin `
            -B build `
            -G "Visual Studio 17 2022" `
            -A x64

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configure failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Build generated plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake --build build --config Release --parallel

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Collect VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Write-Host "Searching for built VST3..."
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "*.vst3" |
            Select-Object -First 1

          if (-not $vst3) {
            Write-Error "No VST3 bundle was built."
            Write-Host "Build folder contents:"
            Get-ChildItem -Path build -Recurse |
              Select-Object -First 500 |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found VST3:"
          Write-Host $vst3.FullName

          Copy-Item $vst3.FullName -Destination artifact -Recurse -Force

          Write-Host "Artifact contents:"
          Get-ChildItem -Path artifact -Recurse |
            ForEach-Object { Write-Host $_.FullName }

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Windows-VST3
          path: artifact