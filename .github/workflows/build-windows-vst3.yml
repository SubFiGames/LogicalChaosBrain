name: Build Windows VST3

'on':
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Clone JUCE
        shell: bash
        run: |
          set -e
          git clone --depth 1 https://github.com/juce-framework/JUCE.git tools/JUCE

      - name: Install Cmajor Windows tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exeUrl    = "https://github.com/cmajor-lang/cmajor/releases/download/1.0.3096/cmajor_win_x64.exe"
          $exeFile   = "$env:GITHUB_WORKSPACE\cmajor_win_x64.exe"
          $installTo = "C:\cmajor"

          Write-Host "Downloading CMajor Windows installer..."
          Invoke-WebRequest -Uri $exeUrl -OutFile $exeFile

          # Run NSIS silent install (/S = silent, /D = install directory)
          Write-Host "Running silent installer to $installTo ..."
          $proc = Start-Process -FilePath $exeFile `
            -ArgumentList "/S", "/D=$installTo" `
            -Wait -PassThru -NoNewWindow
          Write-Host "Installer exit code: $($proc.ExitCode)"

          # If the installer put files somewhere else, search common locations
          $searchRoots = @($installTo, "C:\Program Files\Cmajor", "C:\Program Files (x86)\Cmajor")
          $found = $false
          foreach ($root in $searchRoots) {
            if (Test-Path $root) {
              Write-Host "Found install at: $root"
              Get-ChildItem -Path $root -Recurse | ForEach-Object { Write-Host $_.FullName }
              $found = $true
              break
            }
          }

          if (-not $found) {
            # Fallback: extract with 7-Zip
            Write-Host "Silent install didn't find output; falling back to 7-Zip extraction..."
            New-Item -ItemType Directory -Force -Path $installTo | Out-Null
            & "C:\Program Files\7-Zip\7z.exe" x $exeFile "-o$installTo" -y
            Write-Host "7-Zip extracted contents:"
            Get-ChildItem -Path $installTo -Recurse | ForEach-Object { Write-Host $_.FullName }
          }

          # Expose install root for the next step
          echo "CMAJOR_INSTALL=$installTo" >> $env:GITHUB_ENV

      - name: Find cmaj executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $cmaj = Get-ChildItem -Path $env:CMAJOR_INSTALL -Recurse -Filter "cmaj.exe" |
            Select-Object -First 1

          if (-not $cmaj) {
            Write-Error "Could not find cmaj.exe under $env:CMAJOR_INSTALL"
            Get-ChildItem -Path $env:CMAJOR_INSTALL -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found cmaj at: $($cmaj.FullName)"
          echo "CMAJ_PATH=$($cmaj.FullName)" >> $env:GITHUB_ENV

          & $cmaj.FullName --help
          Write-Host "cmaj found and ready."

      - name: Validate required project files
        shell: bash
        run: |
          set -e

          echo "Repo files:"
          find . -maxdepth 3 -type f | sort

          test -f LogicalChaos.cmajorpatch
          test -f Main.cmajor
          test -f view.js

      - name: Generate JUCE project from Cmajor patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $jucePath = Join-Path $env:GITHUB_WORKSPACE "tools\JUCE"

          Write-Host "Running: cmaj generate --target=juce --output=GeneratedPlugin --jucePath=$jucePath LogicalChaos.cmajorpatch"

          & $env:CMAJ_PATH generate `
            --target=juce `
            --output=GeneratedPlugin `
            "--jucePath=$jucePath" `
            LogicalChaos.cmajorpatch

          if ($LASTEXITCODE -ne 0) {
            Write-Error "cmaj generate failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "Generated project:"
          Get-ChildItem -Path GeneratedPlugin -Recurse |
            Select-Object -First 200 |
            ForEach-Object { Write-Host $_.FullName }

      - name: Configure generated plugin
        shell: bash
        run: |
          set -e

          cmake \
            -S GeneratedPlugin \
            -B build \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build generated plugin
        shell: bash
        run: |
          set -e

          cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: bash
        run: |
          set -e

          mkdir -p artifact

          echo "Searching for built VST3..."
          find build -name "*.vst3" -print

          VST3_PATH=$(find build -name "*.vst3" | head -1)

          if [ -z "$VST3_PATH" ]; then
            echo "No VST3 was built."
            echo "Build folder contents:"
            find build -maxdepth 6 -type f | head -300
            exit 1
          fi

          echo "Found VST3: $VST3_PATH"
          cp -R "$VST3_PATH" artifact/

          echo "Artifact contents:"
          find artifact -maxdepth 4 -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Windows-VST3
          path: artifact
