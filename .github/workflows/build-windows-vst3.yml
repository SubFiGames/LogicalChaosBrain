name: Build Windows VST3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-vst3:
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout Steinberg VST3 SDK
        uses: actions/checkout@v4
        with:
          repository: steinbergmedia/vst3sdk
          submodules: recursive
          path: tools/vst3sdk

      - name: Validate fallback VST files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $requiredFiles = @(
            "vst3\CMakeLists.txt",
            "vst3\LogicalChaosVST3.cpp",
            "src\LogicalChaosEngine.h",
            "src\LogicalChaosEngine.cpp",
            "tools\vst3sdk\CMakeLists.txt"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing required file: $file"
              exit 1
            }
          }

          Write-Host "Fallback VST3 files are present."

      - name: Configure fallback VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake `
            -S vst3 `
            -B build-vst3 `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DVST3_SDK_ROOT="$env:GITHUB_WORKSPACE\tools\vst3sdk"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configure failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Build fallback VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          cmake --build build-vst3 --config Release --parallel

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Collect VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Write-Host "Searching for built VST3..."
          $vst3 = Get-ChildItem -Path build-vst3 -Recurse -Directory -Filter "*.vst3" |
            Select-Object -First 1

          if (-not $vst3) {
            Write-Error "No VST3 bundle was built."
            Write-Host "Build folder contents:"
            Get-ChildItem -Path build-vst3 -Recurse |
              Select-Object -First 600 |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found VST3:"
          Write-Host $vst3.FullName

          Copy-Item $vst3.FullName -Destination artifact -Recurse -Force

          Write-Host "Artifact contents:"
          Get-ChildItem -Path artifact -Recurse |
            ForEach-Object { Write-Host $_.FullName }

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicalChaos-Fallback-Windows-VST3
          path: artifact
