<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Logical Chaos Melody Machine</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#0d0d12; color:#e0e0ff;
                 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                 -webkit-user-select: none; user-select: none; overflow: auto; }
    #engine-bar { position: sticky; top: 0; z-index: 10;
                  background: #15151d; border-bottom: 1px solid #2a2a3a;
                  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
                  flex-wrap: wrap; }
    #engine-bar button { background: #2a2a3a; color: #e0e0ff; border: 1px solid #3a3a55;
                         padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; }
    #engine-bar button:hover { background: #3a3a55; }
    #engine-bar #engine-status { font-size: 12px; color: #9999b3; flex:1; min-width: 200px; }
    #root { width:100%; }

    /* Diagnostic panel — only visible when there's something to report. */
    #diagnostic { display: none; padding: 12px 16px; background: #1a0a0a;
                  border-bottom: 1px solid #5a1a1a; color: #ff9a9a;
                  font-family: monospace; font-size: 11px; white-space: pre-wrap;
                  max-height: 200px; overflow: auto; }
    #diagnostic.show { display: block; }
  </style>
</head>
<body>
<div id="engine-bar">
  <button id="audio-toggle" data-testid="audio-toggle-btn">Start Audio</button>
  <button id="diag-toggle"  data-testid="diag-toggle-btn">Diagnostics</button>
  <span   id="engine-status">UI ready &mdash; tap "Start Audio" to load the engine.</span>
</div>
<div id="diagnostic" data-testid="diagnostic-panel"></div>
<div id="root"></div>

<script>
/* --- Audio engine button -------------------------------------------------- */
(function () {
  const btn   = document.getElementById ('audio-toggle');
  const stat  = document.getElementById ('engine-status');
  const diag  = document.getElementById ('diagnostic');
  const dbtn  = document.getElementById ('diag-toggle');
  let running = false;

  const showDiag = (text) => {
    diag.textContent = text || '(empty)';
    diag.classList.add ('show');
  };

  dbtn.addEventListener ('click', () => {
    if (diag.classList.contains ('show')) {
      diag.classList.remove ('show');
      return;
    }
    const host = window.AndroidHost;
    let txt = 'AndroidHost bridge: ' + (host ? 'present' : 'MISSING') + '\n';
    if (host && host.getNativeStatus) {
      try { txt += 'status: ' + host.getNativeStatus() + '\n\n'; }
      catch (e) { txt += 'status threw: ' + e + '\n\n'; }
    }
    if (host && host.readProgressLog) {
      try { txt += 'progress.log:\n' + host.readProgressLog(); }
      catch (e) { txt += 'readProgressLog threw: ' + e; }
    }
    showDiag (txt);
  });

  btn.addEventListener ('click', () => {
    const host = window.AndroidHost;
    if (!host) { stat.textContent = 'AndroidHost bridge missing.'; return; }
    try {
      if (!running) {
        // Prefer the new startEngine(); fall back to startAudio() for older bridges.
        const startFn = host.startEngine || host.startAudio;
        const err = startFn ? startFn.call (host) : '';
        if (err && err.length > 0) {
          stat.textContent = 'Start failed: ' + err.split ('\n')[0];
          stat.style.color = '#ff8080';
          // Also auto-show the progress log to help diagnose.
          if (host.readProgressLog) {
            try { showDiag ('Start failed: ' + err + '\n\nprogress.log:\n' + host.readProgressLog()); }
            catch (_) {}
          }
        } else {
          running = true;
          btn.textContent = 'Stop Audio';
          stat.textContent = 'Audio engine running.';
          stat.style.color = '#88ff88';
        }
      } else {
        if (host.stopAudio) host.stopAudio();
        running = false;
        btn.textContent = 'Start Audio';
        stat.textContent = 'Audio stopped.';
        stat.style.color = '#9999b3';
      }
    } catch (e) {
      stat.textContent = 'startAudio threw: ' + (e && e.message || e);
      stat.style.color = '#ff8080';
    }
  });
})();
</script>

<script>
/*
 * Bridge: expose a patchConnection object that view.js can use.
 * Every call is forwarded to the Android host via the @JavascriptInterface
 * bound as `AndroidHost` in MainActivity.
 */
(function () {
  const host = window.AndroidHost || {};
  const listeners = new Map();  // endpointID -> [fn, ...]

  function notifyListeners (endpointID, value) {
    const arr = listeners.get (endpointID);
    if (arr) for (const fn of arr) { try { fn (value); } catch (e) { console.error (e); } }
  }

  const connection = {
    // Outgoing --------------------------------------------------------------
    sendEventOrValue (endpointID, value) {
      const v = typeof value === 'number' ? value : (value ? 1 : 0);
      try { host.sendEvent (String (endpointID), v); } catch (e) { console.warn (e); }
    },
    sendParameterGestureStart (id) { /* no-op on mobile */ },
    sendParameterGestureEnd   (id) { /* no-op on mobile */ },
    requestParameterValue     (id) { /* no-op: we don't round-trip state yet */ },
    requestStatusUpdate       ()   { /* no-op */ },
    requestStoredStateValue   (k)  { /* no-op */ },
    sendStoredStateValue      (k,v){ /* no-op */ },
    sendMIDIInputEvent        ()   { /* no-op */ },
    sendFullStoredState       ()   { /* no-op */ },
    requestFullStoredState    ()   { /* no-op */ },

    // Incoming listeners (plumbing only — engine→JS events are a future
    // enhancement; the UI will still render and send events correctly).
    addEndpointListener       (id, fn) {
      if (!listeners.has (id)) listeners.set (id, []);
      listeners.get (id).push (fn);
    },
    removeEndpointListener    (id, fn) {
      const arr = listeners.get (id);
      if (!arr) return;
      const i = arr.indexOf (fn);
      if (i >= 0) arr.splice (i, 1);
    },
    addAllParameterListener    () {},
    removeAllParameterListener () {},
    addStoredStateValueListener    () {},
    removeStoredStateValueListener () {},
    addStatusListener    () {},
    removeStatusListener () {},

    getResourceAddress (relative) {
      // view.js sometimes asks for an absolute URL for auxiliary assets.
      // All our assets are co-located next to index.html in /assets.
      return relative;
    },

    // Hook for native -> JS (optional, called by future JNI callbacks).
    _receiveEvent: notifyListeners,
  };

  // Expose for view.js to pick up.
  window.patchConnection = connection;
})();

/*
 * Mount the patch view.
 * On Android WebView file://, dynamic import/fetch can be blocked.
 * Build pipeline inlines view.js into this page as createPatchView().
 */
async function loadViewModule () {
  // Happy path (desktop CHOC WebView etc.)
  try {
    return await import ('./view.js');
  } catch (e1) {
    console.warn ('Direct import of view.js failed, retrying via blob URL:', e1);
  }

  // Fallback: fetch the source text, wrap in a Blob, import that URL.
  const resp = await fetch ('./view.js');
  if (! resp.ok) throw new Error ('fetch view.js -> HTTP ' + resp.status);
  const text = await resp.text();
  const blob = new Blob ([text], { type: 'application/javascript' });
  const url  = URL.createObjectURL (blob);
  try {
    return await import (url);
  } finally {
    // Free the blob even if import threw.
    URL.revokeObjectURL (url);
  }
}

(async function mount () {
  try {
    const create = window.createPatchView;
    if (typeof create !== 'function') {
      document.getElementById ('root').textContent =
        'createPatchView() not found. Inline view.js injection failed.';
      return;
    }
    const view = await create (window.patchConnection);
    if (view) document.getElementById ('root').appendChild (view);
  } catch (err) {
    console.error (err);
    const root = document.getElementById ('root');
    root.innerHTML = '<div style="padding:24px;">'
      + '<h2>Logical Chaos Melody Machine</h2>'
      + '<p style="color:#ff8080;">Failed to initialise view:</p>'
      + '<pre style="white-space:pre-wrap;color:#ff8080;">' + String (err && (err.stack || err.message || err)) + '</pre>'
      + '</div>';
  }
})();})();
</script>
<script>
/*__INLINE_VIEW_JS__*/
</script>
<script>
/*__INLINE_VIEW_JS__*/
</script>
</body>
</html>
